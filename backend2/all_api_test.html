<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医药问答系统 - 全接口测试平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #0f0f0f;
            color: #d4d4d4;
            height: 100vh;
            overflow: hidden;
        }
        
        .app {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }
        
        /* 顶部导航 */
        .top-bar {
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }
        .top-bar h1 {
            font-size: 18px;
            color: white;
        }
        .top-bar .status {
            display: flex;
            gap: 20px;
            font-size: 13px;
            color: white;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        .status-dot.offline { background: #f87171; animation: none; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 主体布局 */
        .main {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        
        /* 左侧导航 */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            border-right: 1px solid #2d2d44;
            overflow-y: auto;
        }
        .nav-section {
            border-bottom: 1px solid #2d2d44;
        }
        .nav-title {
            padding: 12px 16px;
            font-size: 12px;
            font-weight: bold;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #16162a;
            cursor: pointer;
            user-select: none;
        }
        .nav-title::before {
            content: '▼ ';
            font-size: 10px;
        }
        .nav-title.collapsed::before {
            content: '▶ ';
        }
        .nav-list {
            display: block;
        }
        .nav-list.collapsed {
            display: none;
        }
        .nav-item {
            padding: 8px 16px 8px 32px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            border-left: 3px solid transparent;
        }
        .nav-item:hover {
            background: #252545;
            border-left-color: #667eea;
        }
        .nav-item.active {
            background: #2d2d50;
            border-left-color: #667eea;
            color: #fff;
        }
        .nav-item .method {
            font-size: 10px;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 3px;
            min-width: 42px;
            text-align: center;
        }
        .method.get { background: #059669; color: white; }
        .method.post { background: #d97706; color: white; }
        .method.put { background: #2563eb; color: white; }
        .method.delete { background: #dc2626; color: white; }
