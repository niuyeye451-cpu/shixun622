<script>
// ========== Login Page Logic ==========
let currentRole = 'patient';
let smsId = null;

// Role switching
document.querySelectorAll('.role-card').forEach(card => {
  card.addEventListener('click', () => {
    // Update visual state
    document.querySelectorAll('.role-card').forEach(c => {
      c.classList.remove('border-2', 'border-on-primary', 'shadow-lg', 'bg-surface-container-lowest/20');
      c.classList.add('border', 'border-white/20', 'bg-white/5');
    });
    card.classList.add('border-2', 'border-on-primary', 'shadow-lg', 'bg-surface-container-lowest/20');
    card.classList.remove('border', 'border-white/20', 'bg-white/5');

    currentRole = card.dataset.role;
    switchLoginMode(currentRole);
  });
});

function switchLoginMode(role) {
  const phoneGroup = document.getElementById('phone-group');
  const smsGroup = document.getElementById('sms-group');
  const usernameGroup = document.getElementById('username-group');
  const passwordGroup = document.getElementById('password-group');
  const title = document.getElementById('login-title');
  const desc = document.getElementById('login-desc');

  if (role === 'patient') {
    phoneGroup.style.display = 'flex';
    smsGroup.style.display = 'flex';
    usernameGroup.style.display = 'none';
    passwordGroup.style.display = 'none';
    title.textContent = '用户登录';
    desc.textContent = '请输入您的手机号码及验证码以进入系统。';
  } else if (role === 'doctor') {
    phoneGroup.style.display = 'none';
    smsGroup.style.display = 'none';
    usernameGroup.style.display = 'flex';
    passwordGroup.style.display = 'flex';
    title.textContent = '医师登录';
    desc.textContent = '请输入您的用户名及密码以进入系统。';
  } else if (role === 'admin') {
    phoneGroup.style.display = 'none';
    smsGroup.style.display = 'none';
    usernameGroup.style.display = 'flex';
    passwordGroup.style.display = 'flex';
    title.textContent = '管理员登录';
    desc.textContent = '请输入管理员账号及密码以进入系统。';
  }
}

async function sendSmsCode() {
  const phone = document.getElementById('phone').value.trim();
  if (!phone || phone.length !== 11) {
    showToast('请输入正确的11位手机号码', 'error');
    return;
  }
  const btn = document.getElementById('sms-btn');
  btn.disabled = true;
  btn.textContent = '发送中...';
  try {
    const res = await AuthAPI.sendSms(phone, 'login');
    if (res.code === 200) {
      smsId = res.data.sms_id;
      showToast('验证码已发送 (演示: 123456)', 'success');
      // Countdown
      let sec = 60;
      const timer = setInterval(() => {
        sec--;
        btn.textContent = `${sec}s后重发`;
        if (sec <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = '获取验证码';
        }
      }, 1000);
    }
  } catch (err) {
    showToast('发送失败: ' + err.message, 'error');
    btn.disabled = false;
    btn.textContent = '获取验证码';
  }
}

async function handleLogin() {
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span> 登录中...';

  try {
    let res;
    if (currentRole === 'patient') {
      const phone = document.getElementById('phone').value.trim();
      const code = document.getElementById('code').value.trim();
      if (!phone || !code) {
        showToast('请输入手机号和验证码', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
        return;
      }
      if (!smsId) {
        showToast('请先获取验证码', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
        return;
      }
      res = await AuthAPI.patientLogin(phone, code, smsId);
    } else if (currentRole === 'doctor') {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        showToast('请输入用户名和密码', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
        return;
      }
      res = await AuthAPI.doctorLogin(username, password);
    } else if (currentRole === 'admin') {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        showToast('请输入用户名和密码', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
        return;
      }
      res = await AuthAPI.adminLogin(username, password);
    }

    if (res && res.code === 200) {
      showToast('登录成功！正在跳转...', 'success');
      setTimeout(() => {
        const redirects = {
          patient: 'page2.html',
          doctor: 'page3.html',
          admin: 'page4.html'
        };
        window.location.href = redirects[currentRole];
      }, 500);
    }
  } catch (err) {
    showToast('登录失败: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '登 录';
  }
}

// Allow Enter key to submit
document.getElementById('login-form').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    handleLogin();
  }
});

// Initialize with patient mode selected
document.getElementById('role-patient').click();
</script>
