<!DOCTYPE html>
<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>知识检索 - MedGraph AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "surface-variant": "#e1e2e4", "tertiary-fixed": "#ffddb3", "primary-fixed": "#dae2ff",
          "surface": "#f8f9fb", "error-container": "#ffdad6", "outline": "#737685",
          "tertiary-fixed-dim": "#ffb950", "on-tertiary-container": "#ffca81",
          "surface-container-high": "#e7e8ea", "inverse-surface": "#2e3132", "primary": "#003d9b",
          "inverse-on-surface": "#f0f1f3", "secondary": "#006b59", "inverse-primary": "#b2c5ff",
          "secondary-container": "#7cf8da", "secondary-fixed": "#7cf8da", "on-surface-variant": "#434654",
          "outline-variant": "#c3c6d6", "on-tertiary-fixed-variant": "#624000",
          "on-primary-fixed-variant": "#0040a2", "surface-container-highest": "#e1e2e4",
          "on-secondary-fixed": "#00201a", "surface-bright": "#f8f9fb", "primary-container": "#0052cc",
          "on-primary": "#ffffff", "on-secondary-fixed-variant": "#005143", "secondary-fixed-dim": "#5ddbbe",
          "error": "#ba1a1a", "surface-container-low": "#f3f4f6", "tertiary": "#5e3c00",
          "on-primary-container": "#c4d2ff", "on-background": "#191c1e",
          "surface-container-lowest": "#ffffff", "surface-container": "#edeef0", "on-surface": "#191c1e",
          "on-tertiary": "#ffffff", "tertiary-container": "#7d5200", "surface-tint": "#0c56d0",
          "on-tertiary-fixed": "#291800", "on-secondary": "#ffffff", "on-primary-fixed": "#001848",
          "surface-dim": "#d9dadc", "background": "#f8f9fb", "primary-fixed-dim": "#b2c5ff",
          "on-error-container": "#93000a", "on-secondary-container": "#00725f", "on-error": "#ffffff"
        },
        "borderRadius": { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        "spacing": { "md": "24px", "sm": "16px", "lg": "32px", "margin-mobile": "16px", "xl": "48px", "base": "4px", "xs": "8px", "margin-desktop": "40px", "gutter": "24px" },
        "fontFamily": {
          "label-sm": ["Inter"], "label-md": ["JetBrains Mono"], "headline-lg": ["Inter"],
          "headline-lg-mobile": ["Inter"], "body-md": ["Inter"], "headline-md": ["Inter"],
          "display-lg": ["Inter"], "body-lg": ["Inter"]
        },
        "fontSize": {
          "label-sm": ["12px", {"lineHeight":"16px","fontWeight":"600"}],
          "label-md": ["14px", {"lineHeight":"20px","letterSpacing":"0.02em","fontWeight":"500"}],
          "headline-lg": ["32px", {"lineHeight":"40px","letterSpacing":"-0.01em","fontWeight":"600"}],
          "headline-lg-mobile": ["24px", {"lineHeight":"32px","fontWeight":"600"}],
          "body-md": ["16px", {"lineHeight":"24px","fontWeight":"400"}],
          "headline-md": ["24px", {"lineHeight":"32px","fontWeight":"600"}],
          "display-lg": ["48px", {"lineHeight":"56px","letterSpacing":"-0.02em","fontWeight":"700"}],
          "body-lg": ["18px", {"lineHeight":"28px","fontWeight":"400"}]
        }
      }
    }
  }
</script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="js/api.js"></script>
<style>
  .kg-node { transition: all 0.3s ease; }
  .kg-node:hover { transform: scale(1.1); filter: drop-shadow(0 0 8px rgba(0,61,155,0.3)); }
</style>
</head>
<body class="bg-background text-on-background min-h-screen font-body-md">

<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-xl border-b border-outline-variant shadow-sm sticky top-0 z-50 flex items-center justify-between px-margin-mobile md:px-margin-desktop h-16 w-full">
  <div class="flex items-center gap-xs">
    <span class="material-symbols-outlined text-primary text-[28px]" style="font-variation-settings: 'FILL' 1;">medical_services</span>
    <a href="page3.html" class="font-headline-md text-headline-md-mobile md:text-headline-md text-primary tracking-tight hover:underline">MedGraph AI</a>
    <span class="text-on-surface-variant font-label-md text-label-md ml-sm">| 知识检索</span>
  </div>
  <div class="flex items-center gap-sm">
    <a href="page3.html" class="px-sm py-xs rounded-lg hover:bg-surface-container-highest/50 transition-colors text-on-surface-variant font-label-md text-label-md flex items-center gap-1">
      <span class="material-symbols-outlined text-[18px]">work</span> 工作台
    </a>
    <button class="px-sm py-xs rounded-lg bg-error/10 text-error hover:bg-error/20 transition-colors font-label-md text-label-md flex items-center gap-1" onclick="handleLogout()">
      <span class="material-symbols-outlined text-[18px]">logout</span> 退出
    </button>
  </div>
</header>

<!-- Main Content -->
<main class="max-w-7xl mx-auto p-margin-mobile md:p-margin-desktop flex flex-col gap-lg">
  <!-- Tab Bar -->
  <div class="flex gap-2 border-b border-outline-variant overflow-x-auto">
    <button class="ktab-btn px-md py-sm rounded-t-lg font-label-md text-label-md border-b-2 border-primary text-primary bg-surface-container-lowest active" data-ktab="knowledge">知识检索</button>
    <button class="ktab-btn px-md py-sm rounded-t-lg font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant" data-ktab="drugs">药品相互作用</button>
    <button class="ktab-btn px-md py-sm rounded-t-lg font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant" data-ktab="graph">知识图谱浏览</button>
    <button class="ktab-btn px-md py-sm rounded-t-lg font-label-md text-label-md border-b-2 border-transparent text-on-surface-variant" data-ktab="feedback">知识反馈</button>
  </div>

  <!-- Tab: Knowledge Search -->
  <section class="ktab-content" id="ktab-knowledge">
    <div class="flex gap-sm mb-lg">
      <div class="relative flex-1">
        <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">search</span>
        <input class="w-full h-12 pl-xl pr-sm rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-md" id="kq-input" placeholder="输入医学问题或关键词，如: 高血压合并糖尿病的首选降压药物" onkeydown="if(event.key==='Enter')searchKnowledge()"/>
      </div>
      <select class="h-12 px-sm rounded-lg border border-outline-variant bg-surface font-body-md" id="kq-type">
        <option value="">全部类型</option>
        <option value="diagnosis">诊断</option>
        <option value="treatment">治疗</option>
        <option value="medication">用药</option>
        <option value="guideline">指南</option>
      </select>
      <button class="h-12 px-lg rounded-lg bg-primary text-on-primary hover:bg-primary/90 font-label-md text-label-md shadow-md flex items-center gap-xs" onclick="searchKnowledge()">
        <span class="material-symbols-outlined text-[20px]">search</span> 检索
      </button>
    </div>
    <div id="kq-results" class="flex flex-col gap-md">
      <div class="text-center p-xl text-on-surface-variant bg-surface-container-lowest rounded-xl border border-outline-variant">
        <span class="material-symbols-outlined text-[48px] mb-sm block">psychology</span>
        <p class="font-headline-md text-headline-md-mobile">输入关键词开始检索医学知识</p>
        <p class="font-body-md text-body-md mt-xs">支持诊断、治疗、用药、指南等类型查询</p>
      </div>
    </div>
  </section>

  <!-- Tab: Drug Interactions -->
  <section class="ktab-content hidden" id="ktab-drugs">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-lg">
      <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg">
        <h3 class="font-headline-md text-headline-md-mobile text-on-surface mb-sm flex items-center gap-xs">
          <span class="material-symbols-outlined text-primary">medication</span> 待检查药品
        </h3>
        <div class="flex gap-sm mb-md">
          <input class="flex-1 h-12 px-sm rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-md" id="drug-input" placeholder="输入药品名称，按回车添加" onkeydown="if(event.key==='Enter')addDrug()"/>
          <button class="h-12 px-md rounded-lg bg-primary text-on-primary hover:bg-primary/90 font-label-md text-label-md" onclick="addDrug()">添加</button>
        </div>
        <div id="drug-list" class="flex flex-wrap gap-xs mb-md"></div>
        <button class="w-full h-12 rounded-lg bg-secondary text-on-secondary hover:bg-secondary-container font-label-md text-label-md shadow-md flex items-center justify-center gap-xs" onclick="checkDrugInteractions()">
          <span class="material-symbols-outlined text-[20px]">science</span>
          检查相互作用
        </button>
      </div>
      <div id="drug-interaction-result" class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg">
        <h3 class="font-headline-md text-headline-md-mobile text-on-surface mb-sm flex items-center gap-xs">
          <span class="material-symbols-outlined text-primary">compare_arrows</span> 相互作用结果
        </h3>
        <p class="text-center p-lg text-on-surface-variant">请先添加药品并点击检查</p>
      </div>
    </div>
  </section>

  <!-- Tab: Knowledge Graph Browse -->
  <section class="ktab-content hidden" id="ktab-graph">
    <div class="flex gap-sm mb-lg">
      <div class="relative flex-1">
        <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">search</span>
        <input class="w-full h-12 pl-xl pr-sm rounded-lg border border-outline-variant bg-surface focus:border-primary focus:ring-1 focus:ring-primary outline-none font-body-md" id="entity-search" placeholder="搜索医疗实体 (疾病/症状/药品/科室)" onkeydown="if(event.key==='Enter')searchEntities()"/>
      </div>
      <select class="h-12 px-sm rounded-lg border border-outline-variant bg-surface font-body-md" id="entity-type-select">
        <option value="">全部类型</option>
        <option value="disease">疾病</option>
        <option value="symptom">症状</option>
        <option value="drug">药品</option>
        <option value="department">科室</option>
        <option value="examination">检查</option>
      </select>
      <button class="h-12 px-lg rounded-lg bg-primary text-on-primary hover:bg-primary/90 font-label-md text-label-md shadow-md flex items-center gap-xs" onclick="searchEntities()">
        <span class="material-symbols-outlined text-[20px]">search</span> 搜索
      </button>
    </div>
    <div id="entity-results" class="flex flex-col gap-md">
      <p class="text-center p-lg text-on-surface-variant">搜索医疗实体以浏览知识图谱</p>
    </div>
    <div id="entity-graph" class="mt-lg bg-[#1e293b] rounded-xl min-h-[300px] flex items-center justify-center">
      <p class="text-white/50">选择实体后此处展示关联图谱</p>
    </div>
  </section>

  <!-- Tab: Knowledge Feedback -->
  <section class="ktab-content hidden" id="ktab-feedback">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-lg">
      <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-lg">
        <h3 class="font-headline-md text-headline-md-mobile text-on-surface mb-sm flex items-center gap-xs">
          <span class="material-symbols-outlined text-primary">rate_review</span> 提交知识反馈
        </h3>
        <div class="flex flex-col gap-sm">
          <select class="w-full h-12 px-sm rounded-lg border border-outline-variant bg-surface font-body-md" id="fb-type">
            <option value="knowledge_error">知识错误</option>
            <option value="content_missing">内容缺失</option>
            <option value="optimization">优化建议</option>
            <option value="other">其他</option>
          </select>
          <input class="w-full h-12 px-sm rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-md" id="fb-title" placeholder="反馈标题*"/>
          <textarea class="w-full px-sm py-xs rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-md" id="fb-content" placeholder="详细说明..." rows="4"></textarea>
          <input class="w-full h-12 px-sm rounded-lg border border-outline-variant bg-surface focus:border-primary outline-none font-body-md" id="fb-correction" placeholder="纠正内容 (可选)"/>
          <button class="w-full h-12 rounded-lg bg-primary text-on-primary hover:bg-primary/90 font-label-md text-label-md shadow-md" onclick="submitKnowledgeFeedback()">提交反馈</button>
        </div>
      </div>
      <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant overflow-hidden">
        <div class="p-sm border-b bg-surface-container-low">
          <h3 class="font-headline-md text-headline-md-mobile text-on-surface">我的反馈记录</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead><tr class="bg-surface border-b">
              <th class="p-sm font-label-sm text-label-sm text-on-surface-variant">标题</th>
              <th class="p-sm font-label-sm text-label-sm text-on-surface-variant">类型</th>
              <th class="p-sm font-label-sm text-label-sm text-on-surface-variant">状态</th>
              <th class="p-sm font-label-sm text-label-sm text-on-surface-variant">时间</th>
            </tr></thead>
            <tbody id="my-fb-table">
              <tr><td colspan="4" class="p-lg text-center text-on-surface-variant">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
// ========== Doctor Knowledge Page Logic ==========
let drugList = [];

document.addEventListener('DOMContentLoaded', () => {
  if (!requireRole('doctor')) return;
  initKnowledgeTabs();
  loadMyFeedbacks();
});

function initKnowledgeTabs() {
  document.querySelectorAll('.ktab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ktab-btn').forEach(b => {
        b.classList.remove('border-primary', 'text-primary', 'bg-surface-container-lowest', 'active');
        b.classList.add('border-transparent', 'text-on-surface-variant');
      });
      btn.classList.add('border-primary', 'text-primary', 'bg-surface-container-lowest', 'active');
      btn.classList.remove('border-transparent', 'text-on-surface-variant');
      document.querySelectorAll('.ktab-content').forEach(c => c.classList.add('hidden'));
      document.getElementById('ktab-' + btn.dataset.ktab).classList.remove('hidden');
    });
  });
}

// ========== Knowledge Search ==========
async function searchKnowledge() {
  const query = document.getElementById('kq-input').value.trim();
  if (!query) return;
  const queryType = document.getElementById('kq-type').value;
  const container = document.getElementById('kq-results');
  container.innerHTML = '<p class="text-center p-lg"><span class="material-symbols-outlined animate-spin">progress_activity</span> 检索中...</p>';

  try {
    const res = await DoctorAPI.queryKnowledge(query, queryType || undefined);
    if (res.code === 200 && res.data.results) {
      renderKnowledgeResults(res.data.results, res.data.query_type);
    } else {
      container.innerHTML = '<p class="text-center p-lg text-on-surface-variant">未找到相关结果</p>';
    }
  } catch (err) {
    container.innerHTML = `<p class="text-center p-lg text-error">检索失败: ${escapeHtml(err.message)}</p>`;
  }
}

function renderKnowledgeResults(results, queryType) {
  const container = document.getElementById('kq-results');
  container.innerHTML = results.map(r => `
    <div class="bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant p-md">
      <div class="flex items-center gap-xs mb-sm">
        <span class="px-2 py-0.5 rounded-full text-[12px] font-medium bg-primary/10 text-primary">${escapeHtml(r.type || 'unknown')}</span>
        <h3 class="font-headline-md text-headline-md-mobile text-on-surface">${escapeHtml(r.name)}</h3>
      </div>
      <p class="font-body-md text-body-md text-on-surface-variant mb-sm">${escapeHtml(r.description || '暂无描述')}</p>
      ${r.related_entities && r.related_entities.length > 0 ? `
        <div class="border-t border-outline-variant/30 pt-sm mt-sm">
          <p class="font-label-sm text-label-sm text-on-surface-variant mb-xs">关联实体:</p>
          <div class="flex flex-wrap gap-2">
            ${r.related_entities.slice(0, 10).map(rel => `
              <span class="px-2 py-1 rounded-full text-[12px] bg-surface-container border border-outline-variant cursor-pointer hover:bg-primary/10 hover:border-primary/30 transition-colors" onclick="viewEntityGraph('${rel.entity_id}')" title="${escapeHtml(rel.relation_name || rel.relation_type)}">
                ${escapeHtml(rel.name)}
                <span class="text-[10px] text-outline ml-1">${escapeHtml(rel.relation_name || rel.relation_type || '')}</span>
              </span>
            `).join('')}
          </div>
        </div>
      ` : ''}
    </div>
  `).join('');
}

// ========== Drug Interactions ==========
function addDrug() {
  const input = document.getElementById('drug-input');
  const name = input.value.trim();
  if (!name) return;
  if (drugList.includes(name)) {
    showToast('该药品已在列表中', 'info');
    return;
  }
  drugList.push(name);
  input.value = '';
  input.focus();
  renderDrugList();
}

function removeDrug(name) {
  drugList = drugList.filter(d => d !== name);
  renderDrugList();
}

function renderDrugList() {
  document.getElementById('drug-list').innerHTML = drugList.map(d => `
    <span class="inline-flex items-center gap-1 bg-primary-fixed text-on-primary-fixed-variant px-3 py-1 rounded-full font-label-sm text-label-sm border border-primary/20">
      ${escapeHtml(d)}
      <button class="material-symbols-outlined text-[14px] hover:text-error" onclick="removeDrug('${escapeHtml(d)}')">close</button>
    </span>
  `).join('');
}

async function checkDrugInteractions() {
  if (drugList.length < 2) {
    showToast('请添加至少2种药品', 'warning');
    return;
  }
  const container = document.getElementById('drug-interaction-result');
  container.innerHTML = '<p class="text-center p-lg"><span class="material-symbols-outlined animate-spin">progress_activity</span> 检查中...</p>';

  try {
    const res = await DoctorAPI.checkDrugInteraction(null, drugList);
    if (res.code === 200) {
      renderInteractionResult(res.data);
    }
  } catch (err) {
    container.innerHTML = `<p class="text-center p-lg text-error">检查失败: ${escapeHtml(err.message)}</p>`;
  }
}

function renderInteractionResult(data) {
  const container = document.getElementById('drug-interaction-result');
  const severe = data.interactions?.filter(i => i.level === 'warning' || i.severity === '高') || [];
  const moderate = data.interactions?.filter(i => i.level !== 'warning' && i.severity === '中') || [];
  const mild = data.interactions?.filter(i => i.severity === '低') || [];

  container.innerHTML = `
    <h3 class="font-headline-md text-headline-md-mobile text-on-surface mb-sm flex items-center gap-xs">
      <span class="material-symbols-outlined text-primary">compare_arrows</span> 相互作用结果
    </h3>
    ${data.summary ? `<p class="font-label-md text-label-md text-on-surface-variant mb-sm">${escapeHtml(data.summary)}</p>` : ''}
    ${severe.length > 0 ? `
      <div class="mb-sm">
        <p class="font-label-sm text-label-sm text-error font-bold mb-xs">严重 (${severe.length})</p>
        ${severe.map(i => `
          <div class="bg-error-container/30 border-l-4 border-error rounded-r-lg p-sm mb-xs">
            <p class="font-label-md text-label-md text-on-surface font-bold">${escapeHtml(i.drug_a)} + ${escapeHtml(i.drug_b)}</p>
            <p class="text-[13px] text-on-surface-variant">${escapeHtml(i.description)}</p>
            <p class="text-[12px] text-outline mt-1">建议: ${escapeHtml(i.recommendation)}</p>
          </div>
        `).join('')}
      </div>
    ` : ''}
    ${moderate.map(i => `
      <div class="bg-surface-container border-l-4 border-[#e65100] rounded-r-lg p-sm mb-xs">
        <p class="font-label-sm text-on-surface font-medium">${escapeHtml(i.drug_a)} + ${escapeHtml(i.drug_b)}</p>
        <p class="text-[13px] text-on-surface-variant">${escapeHtml(i.description)}</p>
      </div>
    `).join('')}
    ${mild.map(i => `
      <div class="bg-surface-container border-l-4 border-[#fbc02d] rounded-r-lg p-sm mb-xs">
        <p class="font-label-sm text-on-surface">${escapeHtml(i.drug_a)} + ${escapeHtml(i.drug_b)}</p>
        <p class="text-[13px] text-on-surface-variant">${escapeHtml(i.description)}</p>
      </div>
    `).join('')}
  `;
}

// ========== Entity Graph Browse ==========
async function searchEntities() {
  const keyword = document.getElementById('entity-search').value.trim();
  if (!keyword) return;
  const type = document.getElementById('entity-type-select').value;
  const container = document.getElementById('entity-results');
  container.innerHTML = '<p class="text-center p-lg">检索中...</p>';

  try {
    const res = await CommonAPI.searchEntities(keyword, type || undefined, 10);
    if (res.code === 200 && res.data.length > 0) {
      container.innerHTML = res.data.map(e => `
        <div class="flex items-center justify-between p-sm rounded-lg bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low transition-colors cursor-pointer" onclick="viewEntityGraph('${e.entity_id}')">
          <div>
            <span class="px-2 py-0.5 rounded-full text-[11px] bg-primary/10 text-primary mr-2">${escapeHtml(e.type)}</span>
            <span class="font-body-md text-on-surface">${escapeHtml(e.name)}</span>
            ${e.aliases ? `<span class="text-[12px] text-on-surface-variant ml-2">别名: ${escapeHtml(e.aliases.join(', '))}</span>` : ''}
          </div>
          <span class="material-symbols-outlined text-outline">chevron_right</span>
        </div>
      `).join('');
    } else {
      container.innerHTML = '<p class="text-center p-lg text-on-surface-variant">未找到实体</p>';
    }
  } catch (err) {
    container.innerHTML = `<p class="text-center p-lg text-error">${escapeHtml(err.message)}</p>`;
  }
}

async function viewEntityGraph(entityId) {
  const graphContainer = document.getElementById('entity-graph');
  graphContainer.innerHTML = '<p class="text-white/50">加载图谱中...</p>';

  try {
    // Get entity detail to find the name
    const detailRes = await CommonAPI.getEntityDetail(entityId);
    if (detailRes.code === 200 && detailRes.data) {
      const graphRes = await CommonAPI.getDiseaseGraph(detailRes.data.name, 2);
      if (graphRes.code === 200 && graphRes.data) {
        const g = graphRes.data;
        if (g.nodes && g.nodes.length > 0) {
          graphContainer.innerHTML = `
            <div class="p-md w-full">
              <div class="flex flex-wrap gap-3 justify-center">
                ${g.nodes.map(n => `
                  <div class="w-20 h-20 rounded-full border-2 ${getNodeColor(n.type)} flex items-center justify-center kg-node cursor-pointer text-center p-1" title="${escapeHtml(n.description || '')}">
                    <span class="text-[10px] text-white leading-tight">${escapeHtml(n.name)}</span>
                  </div>
                `).join('')}
              </div>
              ${g.edges.length > 0 ? `<p class="text-white/50 text-center text-[12px] mt-sm">${g.edges.length} 条关系</p>` : ''}
            </div>`;
        } else {
          graphContainer.innerHTML = '<p class="text-white/50">暂无相关图谱数据</p>';
        }
      }
    }
  } catch (err) {
    graphContainer.innerHTML = `<p class="text-red-400">${escapeHtml(err.message)}</p>`;
  }
}

function getNodeColor(type) {
  const colors = {
    disease: 'border-blue-400 bg-blue-900/50',
    symptom: 'border-red-400 bg-red-900/50',
    drug: 'border-emerald-400 bg-emerald-900/50',
    department: 'border-purple-400 bg-purple-900/50',
    examination: 'border-orange-400 bg-orange-900/50'
  };
  return colors[type] || 'border-gray-400 bg-gray-800/50';
}

// ========== Knowledge Feedback ==========
async function submitKnowledgeFeedback() {
  const type = document.getElementById('fb-type').value;
  const title = document.getElementById('fb-title').value.trim();
  const content = document.getElementById('fb-content').value.trim();
  const correction = document.getElementById('fb-correction').value.trim();
  if (!title || !content) {
    showToast('请填写标题和内容', 'warning');
    return;
  }
  try {
    const res = await DoctorAPI.submitFeedback({
      type, title, content,
      corrected_content: correction || undefined,
      references: []
    });
    if (res.code === 200) {
      showToast('反馈提交成功', 'success');
      document.getElementById('fb-title').value = '';
      document.getElementById('fb-content').value = '';
      document.getElementById('fb-correction').value = '';
      loadMyFeedbacks();
    }
  } catch (err) {
    showToast('提交失败: ' + err.message, 'error');
  }
}

async function loadMyFeedbacks() {
  try {
    const res = await DoctorAPI.getFeedbackList();
    if (res.code === 200) {
      const typeLabels = { knowledge_error:'知识错误', content_missing:'内容缺失', optimization:'优化建议', other:'其他' };
      const statusLabels = { pending:'待处理', processing:'处理中', resolved:'已解决', rejected:'已拒绝' };
      document.getElementById('my-fb-table').innerHTML = res.data.list.map(f => `
        <tr class="border-b border-outline-variant hover:bg-surface-container/50 transition-colors">
          <td class="p-sm text-on-surface max-w-[150px] truncate">${escapeHtml(f.title)}</td>
          <td class="p-sm"><span class="text-[12px] text-on-surface-variant">${typeLabels[f.type] || f.type}</span></td>
          <td class="p-sm"><span class="px-2 py-0.5 rounded-full text-[12px] ${f.status === 'resolved' ? 'bg-secondary-container text-on-secondary-container' : 'bg-tertiary-container text-on-tertiary'}">${statusLabels[f.status] || f.status}</span></td>
          <td class="p-sm text-[13px] text-on-surface-variant">${formatDate(f.created_at)}</td>
        </tr>
      `).join('') || '<tr><td colspan="4" class="p-lg text-center text-on-surface-variant">暂无反馈</td></tr>';
    }
  } catch (err) {
    console.error('加载反馈失败:', err);
  }
}

async function handleLogout() {
  await AuthAPI.logout();
  Token.clear();
  User.clear();
  window.location.href = 'page1.html';
}

function escapeHtml(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
